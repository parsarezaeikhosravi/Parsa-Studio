# GitHub Actions Workflow for CodeQL Static Application Security Testing (SAST)
# For details, see: https://github.com/github/codeql-action

name: "CodeQL Security Scanning"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 18 * * 4' # Runs automatically every Thursday at 18:30 UTC

jobs:
  analyze:
    name: Analyze Codebase
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ] # Tracks our premium frontend JavaScript files

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Initializes the CodeQL tools for scanning
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality # Advanced security and code quality rules

    # Autobuilder tries to build any compiled languages (not needed for static HTML but good for CI stability)
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    # Performs the actual static analysis and uploads results to GitHub Security tab
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
