# پایپ‌لاین انتشار خودکار روی گیت‌هاب پیجز با استفاده از برنچ gh-pages
# همکاران گرامی، این پایپ‌لاین وظیفه دارد به جای دپلوی مستقیم گیت‌هاب اکشنز (که نیاز به دسترسی ادمین برای تغییر منبع دارد)،
# فایل‌ها را روی برنچ اختصاصی gh-pages پوش کند تا بدون نیاز به دسترسی ادمین، دپلوی خودکار با موفقیت انجام شود.

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # تریگر شدن با هر کامیت روی برنچ اصلی

permissions:
  contents: write # برای ساخت و آپدیت برنچ gh-pages دسترسی نوشتن لازم داریم

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to gh-pages Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: './' # دپلوی کل پروژه به صورت استاتیک
          publish_branch: gh-pages # انتشار روی این برنچ
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
