# همکاران گرامی، این پایپ‌لاین به طور خودکار آمار بازدید و کلون‌های مخزن را دریافت کرده
# و نشان‌گرهای (Badges) زنده برای نمایش در README.md تولید می‌کند.
name: Generate Traffic Badges

on:
  schedule:
    - cron: '0 0 * * *' # اجرای خودکار هر روز ساعت 00:00 UTC
  workflow_dispatch: # امکان اجرای دستی از منوی Actions

permissions:
  contents: write # برای پوش کردن فایل‌های SVG به برنچ traffic نیاز به دسترسی نوشتن داریم

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Badges
        uses: yi-Xu-0100/traffic-to-badge@v2
        with:
          my_token: ${{ secrets.GITHUB_TOKEN }}
          static_list: "Parsa-Studio, DR-Sara-Radmanesh" # رعایت دقیق نام مخازن با حروف بزرگ
