# همکاران گرامی، این پایپ‌لاین وظیفه دریافت آمار مخزن و تبدیل آن به نشان‌گرهای SVG را دارد
# در نهایت تصاویر تولید شده را روی برنچ اختصاصی traffic دپلوی می‌کند تا در README قابل نمایش باشد.

name: Generate Traffic Badges

on:
  schedule:
    - cron: '0 0 * * *' # اجرای خودکار هر روز ساعت 00:00 UTC
  workflow_dispatch: # امکان اجرای دستی از منوی Actions

permissions:
  contents: write # برای آپلود و پوش کردن آمار روی برنچ traffic لازم است

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Commit Message
        id: message
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            var time = new Date(Date.now()).toISOString();
            return "Update traffic data at " + time;

      - name: Generate Traffic Badges
        id: traffic
        uses: yi-Xu-0100/traffic-to-badge@v1.4.0
        with:
          my_token: ${{ secrets.GITHUB_TOKEN }}
          static_list: "Parsa-Studio, DR-Sara-Radmanesh" # بررسی دقیق نام مخازن

      - name: Deploy Badges to Traffic Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ steps.traffic.outputs.traffic_branch }}
          publish_dir: ${{ steps.traffic.outputs.traffic_path }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          full_commit_message: ${{ steps.message.outputs.result }}
