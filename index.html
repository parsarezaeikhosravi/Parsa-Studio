/* ============================================================
   ۱۳ — استایل‌های جدید: Testimonials Carousel
   ============================================================ */
.testimonials-section {
  background: var(--bg-deep);
  position: relative;
  overflow: hidden;
}
.testimonials-section .container {
  position: relative;
  z-index: 1;
}
.testimonials-grid {

  grid-template-columns: repeat(4, 1fr);
  gap: 1.5rem;
  margin: 2.5rem 0 2rem;
}
.testimonial-card {
  background: var(--glass-bg-strong);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: 1.8rem 1.4rem;

  display: flex;

.testimonial-card .avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--accent-10);
  border: 1.5px solid var(--accent-20);

.testimonial-card .client-title {

}

  font-style: italic;

  padding-right: 0.8rem;
}
.testimonial-card .quote::before {
  content: "“";
  color: var(--accent);
  opacity: 0.5;
  margin-left: 0.2rem;
}
.testimonial-card .quote::after {

  color: var(--accent);
  opacity: 0.5;
  margin-right: 0.2rem;
}
.testimonial-nav {
  display: flex;
  justify-content: center;
  gap: 1rem;

}

  background: transparent;

  color: var(--ink-soft);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
  display: inline-flex;
  align-items: center;

}

}
.testimonial-nav button:focus-visible {

}
.testimonial-dots {

  gap: 0.6rem;
  margin-top: 0.6rem;
}
.testimonial-dots button {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: transparent;
  padding: 0;
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease;
}

@media (max-width: 1024px) {

<script>
/* ============================================================
   تمام ماژول‌های قبلی (از initNav تا initHeroRain) همان‌طور که
   در index 7.html هستند، بدون تغییر باقی می‌مانند.
   ============================================================ */

// =============================================================
// ماژول جدید ۱۱: Testimonials Carousel (ایزوله، بدون کتابخانه)
// =============================================================
(function initTestimonials() {
  var grid = document.getElementById('testimonials-grid');
  var prevBtn = document.getElementById('testimonial-prev');
  var nextBtn = document.getElementById('testimonial-next');
  var dotsContainer = document.getElementById('testimonial-dots');
  if (!grid || !prevBtn || !nextBtn || !dotsContainer) return;

  // داده‌های نمونه – با نام‌های واقعی و نقل‌قول‌های حرفه‌ای
  var testimonials = [
    {
      name: 'دکتر علیرضا حسن‌پور',
      title: 'دندانپزشک – شیراز',
      avatar: '🦷',
      stars: 5,
      quote: 'سایت من قبلاً در گوشی بیماران خراب می‌شد، اما این سازه‌ی اختصاصی همیشه روان است. نوبت‌دهی آنلاین ما ۴۰٪ رشد داشته.'
    },
    {
      name: 'وکیل محمد مهدی زارع',
      title: 'وکیل پایه یک دادگستری',
      avatar: '⚖️',
      stars: 5,
      quote: 'اعتبار دیجیتال من وابسته به زیبایی و سرعت سایت است. پارسا استودیو این را درک می‌کند، برخلاف طراحان قالب‌محور.'
    },
    {
      name: 'کلینیک زیبایی آسا',
      title: 'مرکز تخصصی پوست و مو',
      avatar: '💎',
      stars: 5,
      quote: 'بیماران ما از همان نگاه اول به سایت، اعتماد می‌کنند. این همان ارزشی است که ما دنبالش بودیم.'
    },
    {
      name: 'موسسه حقوقی نور',
      title: 'دفتر حقوقی بین‌المللی',
      avatar: '📜',
      stars: 5,
      quote: 'مدارک و پرونده‌های ما با سیستم CRM ابری پارسا، امن و در دسترس است. دیگر نگران گم‌شدن اطلاعات نیستیم.'
    }
  ];

  var currentIndex = 0;
  var itemsPerPage = 4;
  var totalPages = Math.ceil(testimonials.length / itemsPerPage);

  function renderPage(index) {
    var start = index * itemsPerPage;
    var end = Math.min(start + itemsPerPage, testimonials.length);
    var pageItems = testimonials.slice(start, end);

    grid.innerHTML = '';
    pageItems.forEach(function(item, idx) {
      var card = document.createElement('div');
      card.className = 'testimonial-card';
      card.setAttribute('role', 'listitem');
      card.setAttribute('tabindex', '0');
      card.innerHTML = `
        <div class="client-row">
          <div class="avatar" style="display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:var(--accent-10);">${item.avatar}</div>
          <div>
            <div class="client-name">${item.name}</div>
            <div class="client-title">${item.title}</div>
          </div>
        </div>
        <div class="stars" aria-label="${item.stars} از ۵ ستاره">${'⭐'.repeat(item.stars)}</div>
        <p class="quote">${item.quote}</p>
      `;
      grid.appendChild(card);
    });

    // به‌روزرسانی دات‌ها
    dotsContainer.querySelectorAll('button').forEach(function(btn, i) {
      btn.classList.toggle('is-active', i === index);
      btn.setAttribute('aria-selected', i === index ? 'true' : 'false');
    });

    // فوکوس روی اولین کارت برای دسترسی‌پذیری
    var firstCard = grid.querySelector('.testimonial-card');
    if (firstCard) firstCard.focus();
  }

  function goTo(index) {
    if (index < 0) index = totalPages - 1;
    if (index >= totalPages) index = 0;
    currentIndex = index;
    renderPage(currentIndex);
    // ردیابی رویداد (با گارد trackEvent که قبلاً تعریف شده)
    if (typeof trackEvent === 'function') {
      trackEvent('testimonial_page_change', { page: currentIndex + 1, total: totalPages });
    }
  }

  // ساخت دات‌ها
  for (var i = 0; i < totalPages; i++) {
    var dot = document.createElement('button');
    dot.setAttribute('role', 'tab');
    dot.setAttribute('aria-label', 'اسلاید ' + (i + 1));
    dot.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
    dot.addEventListener('click', function(idx) { return function() { goTo(idx); }; }(i));
    dotsContainer.appendChild(dot);
  }

  prevBtn.addEventListener('click', function() { goTo(currentIndex - 1); });
  nextBtn.addEventListener('click', function() { goTo(currentIndex + 1); });

  // پشتیبانی از کیبورد
  document.addEventListener('keydown', function(e) {
    var isFocused = grid.contains(document.activeElement);
    if (!isFocused) return;
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      e.preventDefault();
      if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
      else goTo(currentIndex + 1);
    }
    if (e.key === 'Escape') {
      // فوکوس به هرو یا اولین عنصر قابل فوکوس
      var hero = document.querySelector('.hero h1');
      if (hero) hero.focus();
    }
  });

  // رندر اولیه
  renderPage(0);

  // اگر prefers-reduced-motion فعال باشد، کاروسل را غیرفعال نمی‌کنیم
  // چون حرکت خودکار نداریم، فقط ناوبری دستی.
})();


// =============================================================
// ماژول جدید ۱۲: Service Worker + Offline Fallback (ایزوله)
// =============================================================
(function initServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  // فقط در صورتی که سایت روی هاست واقعی باشد (نه localhost یا file://)
  if (window.location.protocol === 'file:') return;

  // ثبت سرویس‌ورکر
  navigator.serviceWorker.register('/sw.js')
    .then(function(reg) {
      console.log('SW registered successfully:', reg);
    })
    .catch(function(err) {
      console.warn('SW registration failed:', err);
    });

  // ردیابی وضعیت آفلاین/آنلاین برای نمایش پیام به کاربر (اختیاری)
  var offlineMsg = document.createElement('div');
  offlineMsg.style.cssText = 'position:fixed;bottom:1rem;right:1rem;background:var(--accent);color:var(--on-accent);padding:0.8rem 1.2rem;border-radius:var(--radius-sm);font-weight:700;z-index:400;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.4);';
  offlineMsg.textContent = '⚠️ شما آفلاین هستید — محتوای کش‌شده در دسترس است.';
  document.body.appendChild(offlineMsg);

  window.addEventListener('online', function() {
    offlineMsg.style.display = 'none';
  });
  window.addEventListener('offline', function() {
    offlineMsg.style.display = 'block';
    // اگر trackEvent تعریف شده باشد
    if (typeof trackEvent === 'function') {
      trackEvent('offline_detected');
    }
  });
})();


// =============================================================
// ماژول جدید ۱۳: Local Error Tracker + Debug Panel (ایزوله)
// =============================================================
(function initErrorTracker() {
  var STORAGE_KEY = 'studio_errors';
  var MAX_ERRORS = 50;
  var RETENTION_DAYS = 7;

  // تابع برای ذخیره‌ی خطا در localStorage
  function storeError(errorData) {
    try {
      var existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      existing.unshift({
        timestamp: Date.now(),
        message: errorData.message || 'Unknown error',
        stack: errorData.stack || '',
        userAgent: navigator.userAgent,
        url: window.location.href
      });
      // محدود کردن تعداد و حذف خطاهای قدیمی
      var cutoff = Date.now() - RETENTION_DAYS * 24 * 60 * 60 * 1000;
      existing = existing.filter(function(e) { return e.timestamp > cutoff; });
      if (existing.length > MAX_ERRORS) existing = existing.slice(0, MAX_ERRORS);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
    } catch (err) {
      // اگر localStorage پر بود یا غیرقابل‌دسترس، بی‌صدا رد می‌شویم
    }
  }

  // گرفتن خطاهای unhandled
  window.addEventListener('error', function(event) {
    storeError({
      message: event.message,
      stack: event.error ? event.error.stack : ''
    });
    // اگر trackEvent تعریف شده باشد
    if (typeof trackEvent === 'function') {
      trackEvent('js_error', { message: event.message.slice(0, 60) });
    }
  });

  // گرفتن promise rejectionهای unhandled
  window.addEventListener('unhandledrejection', function(event) {
    var reason = event.reason;
    storeError({
      message: 'Unhandled Promise Rejection: ' + (reason && reason.message ? reason.message : String(reason)),
      stack: reason && reason.stack ? reason.stack : ''
    });
  });

  // ---- صفحه‌ی مخفی /debug با هش SHA256 (ساده) ----
  // هش: "parsa-debug-2026" → SHA256 (برای سادگی از یک چک ساده استفاده می‌کنیم)
  // در عمل می‌توانی با یک هش واقعی جایگزین کنی.
  var DEBUG_PASSWORD = 'parsa-debug-2026';
  function simpleHash(str) {
    var hash = 0;
    for (var i = 0; i < str.length; i++) {
      var char = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash |= 0; // Convert to 32bit integer
    }
    return 'h' + Math.abs(hash).toString(16);
  }
  var expectedHash = simpleHash(DEBUG_PASSWORD);

  // بررسی URL: اگر包含 ?debug=hash باشد، صفحه‌ی debug را نمایش می‌دهیم
  function showDebugPanel() {
    var params = new URLSearchParams(window.location.search);
    var provided = params.get('debug');
    if (!provided) return;
    if (provided !== expectedHash) {
      document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:4rem;">🔒 دسترسی غیرمجاز</h1>';
      return;
    }

    // نمایش پنل دیباگ به‌جای محتوای فعلی (یا به‌عنوان overlay)
    var errors = [];
    try {
      errors = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch (e) {}

    // دریافت metrics از PerformanceObserver (اگر مرورگر پشتیبانی کند)
    var metrics = { fcp: '—', lcp: '—', cls: '—' };
    if (window.performance && window.performance.getEntriesByType) {
      var paintEntries = performance.getEntriesByType('paint');
      paintEntries.forEach(function(entry) {
        if (entry.name === 'first-contentful-paint') metrics.fcp = entry.startTime.toFixed(2) + 'ms';
      });
      var lcpEntries = performance.getEntriesByType('largest-contentful-paint');
      if (lcpEntries.length) {
        metrics.lcp = lcpEntries[lcpEntries.length - 1].startTime.toFixed(2) + 'ms';
      }
      // CLS از طریق observer گرفته نمی‌شود، ولی می‌توان از layout-shift entries استفاده کرد
      try {
        var clsObserver = new PerformanceObserver(function(list) {
          var cumulative = 0;
          list.getEntries().forEach(function(entry) {
            if (!entry.hadRecentInput) cumulative += entry.value;
          });
          metrics.cls = cumulative.toFixed(3);
        });
        clsObserver.observe({ type: 'layout-shift', buffered: true });
        // برای گرفتن مقدار نهایی یک تایم‌اوت کوتاه
        setTimeout(function() {
          // مقدار cls در metrics.cls به‌روز می‌شود
        }, 500);
      } catch (e) {}
    }

    // ساخت پنل
    var panel = document.createElement('div');
    panel.className = 'debug-panel';
    panel.innerHTML = `
      <h2>🧪 پنل دیباگ — استودیو پارسا</h2>
      <div class="metrics-grid">
        <div class="metric"><div class="value">${metrics.fcp}</div><div class="label">FCP</div></div>
        <div class="metric"><div class="value">${metrics.lcp}</div><div class="label">LCP</div></div>
        <div class="metric"><div class="value">${metrics.cls}</div><div class="label">CLS</div></div>
        <div class="metric"><div class="value">${errors.length}</div><div class="label">خطاهای ثبت‌شده</div></div>
      </div>
      <div class="actions">
        <button id="export-json">📥 خروجی JSON</button>
        <button id="clear-errors" class="danger">🗑️ پاک‌سازی خطاها</button>
        <button id="back-to-site">↩️ بازگشت به سایت</button>
      </div>
      <div id="error-list">
        ${errors.length === 0 ? '<p style="color:var(--ink-soft);">✅ هیچ خطایی ثبت نشده است.</p>' :
          errors.map(function(e) {
            return `<div class="error-item">
              <div class="meta">${new Date(e.timestamp).toLocaleString('fa-IR')} — ${e.userAgent}</div>
              <div class="msg">${e.message}</div>
              ${e.stack ? `<div class="stack">${e.stack}</div>` : ''}
            </div>`;
          }).join('')
        }
      </div>
    `;
    document.body.innerHTML = '';
    document.body.appendChild(panel);

    // event listeners
    document.getElementById('export-json').addEventListener('click', function() {
      var data = JSON.stringify({ errors: errors, metrics: metrics, exportedAt: new Date().toISOString() }, null, 2);
      var blob = new Blob([data], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'studio-debug-' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
    });
    document.getElementById('clear-errors').addEventListener('click', function() {
      if (confirm('همه‌ی خطاهای ذخیره‌شده پاک می‌شوند. ادامه می‌دهید؟')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    });
    document.getElementById('back-to-site').addEventListener('click', function() {
      window.location.href = window.location.pathname;
    });
  }

  // اجرا در صورتی که پارامتر debug وجود داشته باشد
  showDebugPanel();
})();

</script>

</body>
</html>
